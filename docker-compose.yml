# docker-compose.yml
version: '3.8'

services:
  backend:
    image: markoff-backend:dev
    container_name: markoff-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://markoff:1@192.168.2.4:5432/markoff2_0_db
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/src:/app/src
    networks:
      - markoff-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  client:
    image: markoff-client:dev
    container_name: markoff-client
    environment:
      # Для VcXsrv на Windows нужно указать IP хоста
      - DISPLAY=host.docker.internal:0.0
      - QT_QPA_PLATFORM=xcb
      - API_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      # Отключаем OpenGL для совместимости
      - QT_OPENGL=software
    volumes:
      - ./client/src:/app/src # Приложение
      - ./client/tests:/app/tests # Тесты
      # Для X11 forwarding через VcXsrv не нужен mount /tmp/.X11-unix на Windows
    networks:
      - markoff-network
    depends_on:
      - backend
    # Убираем временную команду - теперь запускаем реальное GUI
    stdin_open: true
    tty: true

networks:
  markoff-network:
    driver: bridge